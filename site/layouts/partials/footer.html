<footer class="footer" role="contentinfo">
  <div class="footer-inner">
    <div class="footer-l">
      <span class="tmark s24" aria-hidden="true"></span>
      <span><b>{{ site.Title }}</b> &middot; a blog, by hand &middot; &copy; {{ now.Year }}</span>
    </div>
    <nav class="footer-nav" aria-label="Footer">
      <a href="{{ "/" | relURL }}">Writing</a>
      <a href="{{ "/about/" | relURL }}">About</a>
      {{ with site.Params.rssURL }}<a href="{{ . | relURL }}">RSS</a>{{ else }}<a href="{{ "index.xml" | relURL }}">RSS</a>{{ end }}
    </nav>
    <div class="footer-spacer"></div>
    <div class="footer-r"><span class="pip" aria-hidden="true"></span> {{ site.Params.locationTag | default "NORTHWEST PACIFIC · HOSTED ON A PI" }}</div>
  </div>
</footer>
