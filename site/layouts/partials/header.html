<header class="head" role="banner">
  <a class="head-l" href="{{ "/" | relURL }}" aria-label="{{ site.Title }} — home">
    <span class="tmark s32" aria-hidden="true"></span>
    <span class="word">TERMINAL<span class="slash">//</span><span class="eighty">EIGHTY</span><span class="head-pip" aria-hidden="true"></span></span>
  </a>

  <button id="search-toggle" class="search" type="button" aria-label="Open search (Command-K)" aria-haspopup="dialog">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
    <span class="placeholder">Search posts and pages…</span>
    <span class="kbd" aria-hidden="true">⌘K</span>
  </button>

  <div class="head-r">
    <nav class="nav" aria-label="Primary">
      <a href="{{ "/" | relURL }}"{{ if .IsHome }} class="is-active" aria-current="page"{{ end }}>Writing</a>
      <a href="{{ "/about/" | relURL }}"{{ if eq .RelPermalink "/about/" }} class="is-active" aria-current="page"{{ end }}>About</a>
    </nav>
    <span id="site-clock" class="clock" aria-hidden="true">--:--:--</span>
    <button id="theme-toggle" class="theme-btn" type="button" aria-pressed="false">[DARK]</button>
  </div>
</header>
