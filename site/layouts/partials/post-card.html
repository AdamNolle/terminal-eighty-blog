<article class="post-card">
    <a href="{{ .Permalink }}">
        <div class="card-terminal-bar">
            <div class="card-status-box"></div>
            <div class="card-scanlines"></div>
        </div>

        <div class="post-card-content">
            <h2 class="post-title">{{ .Title }}</h2>

            {{ with .Description }}
            <p class="post-excerpt">{{ . }}</p>
            {{ end }}

            <p class="post-meta">
                >> {{ .Date.Format "2006-01-02" }}
                <span style="opacity: 0.5; margin: 0 5px;">|</span>
                {{ .ReadingTime }} min read
                {{ with .Params.tags }}
                <span style="opacity: 0.5; margin: 0 5px;">|</span>
                {{ range $i, $tag := . }}{{ if $i }} {{ end }}[{{ $tag | upper }}]{{ end }}
                {{ end }}
            </p>
        </div>
    </a>
</article>
