{{/*
  embed-vimeo — Phase 7 click-to-load Vimeo placeholder.

  Params:
    id     — Vimeo numeric video id (required)
    title  — Accessible / visible label (optional)
*/}}
{{- $id := .Get "id" -}}
{{- $title := .Get "title" | default (printf "Vimeo video %s" $id) -}}
<figure class="embed embed-vimeo" data-provider="vimeo">
  <button type="button" class="embed-placeholder"
          data-embed-href="https://player.vimeo.com/video/{{ $id }}?autoplay=1"
          data-embed-type="iframe"
          aria-label="Play Vimeo video: {{ $title }}">
    <img class="embed-thumb" src="https://vumbnail.com/{{ $id }}.jpg" alt="" loading="lazy" decoding="async">
    <span class="embed-play-icon" aria-hidden="true">&#9654;</span>
    <span class="embed-meta">{{ $title }}</span>
  </button>
</figure>
