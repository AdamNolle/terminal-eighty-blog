<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Terminal Eighty CMS</title>
    <link rel="stylesheet" href="/css/admin.css">
    <link rel="manifest" href="/manifest.json">
    <!-- SimpleWebAuthn Browser JS -->
    <script src="https://unpkg.com/@simplewebauthn/browser/dist/bundle/index.umd.min.js"></script>
</head>
<body>
    <div class="auth-container" id="setup-panel" style="display: none;">
        <h2>INITIAL SETUP</h2>
        <p>Create the admin account.</p>
        <form id="setup-form">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="setup-user" required autocomplete="username">
            </div>
            <div class="form-group">
                <label>Password (min 8 chars)</label>
                <input type="password" id="setup-pass" required autocomplete="new-password">
            </div>
            <button type="submit" class="primary" style="width: 100%">Create Account</button>
        </form>
    </div>

    <div class="auth-container" id="login-panel" style="display: none;">
        <h2>SYSTEM LOGIN</h2>
        
        <button id="btn-passkey-login" class="primary" style="width: 100%; padding: 15px; font-size: 1.1em;">
            [ USE PASSKEY / FACE ID ]
        </button>

        <div class="auth-divider"><span>OR PASSWORD</span></div>

        <form id="login-form">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="login-user" required autocomplete="username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="login-pass" required autocomplete="current-password">
            </div>
            <button type="submit" style="width: 100%">Login</button>
        </form>
        <p id="auth-error" style="color: var(--terminal-red); text-align: center; display: none;"></p>
    </div>

    <script src="/js/auth.js"></script>
</body>
</html>
